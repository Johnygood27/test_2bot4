<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Encrypted Adder</title>
  <script>
    if (typeof globalThis.fetch !== 'function') {
      globalThis.fetch = window.fetch || (() => { throw new Error("fetch is missing"); });
    }
  </script>
  <style>
    body { font-family: sans-serif; max-width: 420px; margin: 40px auto; text-align: center; }
    input, button { margin: 0.5rem; padding: 0.5rem 1rem; font-size: 1rem; }
    button { background-color: #4caf50; color: white; border: none; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { min-height: 1.4rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Encrypted Adder 🔢</h1>
  <div id="status"></div>
  <input id="a" type="number" placeholder="A" />
  <input id="b" type="number" placeholder="B" />
  <button id="computeBtn">Compute Sum 🧮</button>
  <p id="result"></p>
  <!-- Webpack сам вставит <script src="bundle.js"> сюда -->
</body>
</html>
